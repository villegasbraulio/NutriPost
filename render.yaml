databases:
  - name: nutripost-db
    plan: free

services:
  - type: web
    name: nutripost-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: ./build.sh
    startCommand: gunicorn config.wsgi:application
    healthCheckPath: /health/
    envVars:
      - key: PYTHON_VERSION
        value: 3.12
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: nutripost-db
          property: connectionString
      - key: FRONTEND_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false

databases:
  - name: nutripost-db
    plan: free

services:
  - type: web
    name: nutripost-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: ./build.sh
    startCommand: gunicorn config.wsgi:application
    healthCheckPath: /health/
    envVars:
      - key: PYTHON_VERSION
        value: 3.12
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: nutripost-db
          property: connectionString
      - key: FRONTEND_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
  - type: cron
    name: nutripost-scheduler
    runtime: python
    plan: starter
    rootDir: backend
    schedule: "*/10 * * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python manage.py run_scheduled_jobs --post-workout-limit 200 --insight-user-limit 25
    envVars:
      - key: PYTHON_VERSION
        value: 3.12
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: nutripost-db
          property: connectionString
      - key: SECRET_KEY
        fromService:
          type: web
          name: nutripost-api
          envVarKey: SECRET_KEY
      - key: GROQ_API_KEY
        fromService:
          type: web
          name: nutripost-api
          envVarKey: GROQ_API_KEY
